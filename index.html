<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>符号分类提取结果</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.82);
      --panel-2: rgba(30, 41, 59, 0.88);
      --line: rgba(148, 163, 184, 0.22);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --primary: #38bdf8;
      --primary-2: #22c55e;
      --chip: rgba(56, 189, 248, 0.16);
      --danger: #f97316;
      --shadow: 0 20px 50px rgba(2, 8, 23, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top right, rgba(14, 165, 233, 0.16), transparent 28%),
        radial-gradient(circle at left center, rgba(34, 197, 94, 0.12), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      min-height: 100vh;
    }

    body {
      padding: 24px;
    }

    a {
      color: #7dd3fc;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .nav-link:hover {
      text-decoration: none;
    }

    .page {
      max-width: 1600px;
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    .toolbar,
    .shell,
    .section-head,
    .category-head,
    .category-meta,
    .symbol-grid,
    .nav-links,
    .group-filters {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      background: var(--chip);
      padding: 8px 12px;
      border-radius: 999px;
      color: var(--text);
      font-size: 14px;
    }

    .toolbar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      box-shadow: var(--shadow);
      align-items: center;
      justify-content: space-between;
    }

    .toolbar-left {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      flex: 1 1 620px;
    }

    .toolbar-right {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: flex-end;
      flex: 1 1 320px;
      color: var(--muted);
      font-size: 14px;
    }

    .search {
      width: min(420px, 100%);
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.72);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 14px;
      outline: none;
      font-size: 15px;
    }

    .search:focus {
      border-color: rgba(56, 189, 248, 0.7);
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.14);
    }

    .group-btn,
    .copy-btn,
    .nav-link,
    .symbol-item,
    .top-btn {
      border: 1px solid var(--line);
      background: rgba(30, 41, 59, 0.72);
      color: var(--text);
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .nav-main {
      display: grid;
      grid-template-columns: 1.8em minmax(0, 1fr);
      align-items: center;
      column-gap: 10px;
      min-width: 0;
      width: 100%;
    }

    .nav-symbol {
      width: 1.8em;
      min-width: 1.8em;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1;
      font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", "Segoe UI Symbol", "Microsoft YaHei UI", sans-serif;
    }

    .nav-symbol.is-empty {
      visibility: hidden;
    }

    .nav-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.4;
    }

    .nav-count {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
      white-space: nowrap;
    }

    .group-btn,
    .copy-btn,
    .top-btn {
      padding: 10px 14px;
      font-size: 14px;
    }

    .group-btn:hover,
    .copy-btn:hover,
    .nav-link:hover,
    .symbol-item:hover,
    .top-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(56, 189, 248, 0.55);
      background: rgba(51, 65, 85, 0.95);
    }

    .group-btn.active {
      background: rgba(56, 189, 248, 0.2);
      border-color: rgba(56, 189, 248, 0.75);
    }

    .shell {
      align-items: flex-start;
      flex-wrap: nowrap;
    }

    .sidebar {
      position: sticky;
      top: 24px;
      width: 320px;
      flex: 0 0 320px;
      max-height: calc(100vh - 48px);
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .sidebar h2,
    .content h2 {
      margin: 0;
    }

    .sidebar small {
      display: block;
      margin-top: 6px;
      color: var(--muted);
    }

    .nav-links {
      margin-top: 16px;
      flex-direction: column;
    }

    .nav-link {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      text-decoration: none;
      cursor: grab;
      user-select: none;
      position: relative;
    }

    .nav-link:active {
      cursor: grabbing;
    }

    .nav-link.dragging {
      opacity: 0.42;
    }

    .nav-link.drag-over-before {
      box-shadow: inset 0 3px 0 rgba(56, 189, 248, 0.95);
    }

    .nav-link.drag-over-after {
      box-shadow: inset 0 -3px 0 rgba(56, 189, 248, 0.95);
    }


    .content {
      flex: 1 1 auto;
      min-width: 0;
      display: grid;
      gap: 18px;
    }

    .empty {
      padding: 40px 18px;
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 20px;
      color: var(--muted);
      background: rgba(15, 23, 42, 0.55);
    }

    details.category {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px 18px 20px;
      box-shadow: var(--shadow);
    }

    details.category[open] summary {
      margin-bottom: 14px;
    }

    summary {
      list-style: none;
      cursor: pointer;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    .category-head {
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .category-title {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .category-title h3 {
      margin: 0;
      font-size: 22px;
    }

    .category-meta {
      color: var(--muted);
      font-size: 13px;
    }

    .symbol-grid {
      margin-top: 12px;
      gap: 8px;
    }

    .subsection {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .subsection:first-child {
      margin-top: 12px;
    }

    .subsection-title {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
    }

    .symbol-item {
      width: 76px;
      min-height: 70px;
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-align: center;
      font-family: "Segoe UI", "Microsoft YaHei UI", "PingFang SC", sans-serif;
      position: relative;
      overflow: hidden;
    }

    .glyph {
      font-size: 24px;
      line-height: 1.2;
      word-break: break-all;
      font-family: "Segoe UI Symbol", "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", "Microsoft YaHei UI", sans-serif;
    }

    .glyph.prefer-color {
      font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", "Segoe UI Symbol", "Microsoft YaHei UI", sans-serif;
      font-variant-emoji: emoji;
      color: initial;
    }

    .glyph img.emoji-img {
      width: 1.4em;
      height: 1.4em;
      object-fit: contain;
      vertical-align: middle;
      filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.18));
    }

    .token-label {
      position: absolute;
      left: 6px;
      right: 6px;
      bottom: 6px;
      padding: 3px 5px;
      border-radius: 8px;
      background: rgba(2, 6, 23, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.18);
      font-size: 11px;
      color: var(--text);
      max-width: calc(100% - 12px);
      word-break: break-all;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 0.16s ease, transform 0.16s ease;
      z-index: 1;
    }

    .symbol-item:hover .token-label,
    .symbol-item:focus-visible .token-label {
      opacity: 1;
      transform: translateY(0);
    }

    .section-head {
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
    }

    .section-head p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      padding: 12px 16px;
      background: rgba(2, 6, 23, 0.92);
      color: #fff;
      border: 1px solid rgba(56, 189, 248, 0.45);
      border-radius: 14px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1100px) {
      .shell {
        flex-wrap: wrap;
      }

      .sidebar {
        position: static;
        width: 100%;
        flex-basis: 100%;
        max-height: none;
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 14px;
      }

      .toolbar,
      .sidebar,
      details.category {
        border-radius: 18px;
      }

      .symbol-item {
        width: calc(25% - 8px);
        min-width: 74px;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .toolbar-right {
        justify-content: flex-start;
      }
    }
  </style>
</head>

  <script>
    const DATA = JSON.parse(document.getElementById('symbols-data').textContent);
    const searchInput = document.getElementById('search');
    const groupFilters = document.getElementById('group-filters');
    const resultSummary = document.getElementById('result-summary');
    const navLinks = document.getElementById('nav-links');
    const categoriesContainer = document.getElementById('categories');
    const toast = document.getElementById('toast');
    const copyVisibleBtn = document.getElementById('copy-visible');

    const defaultCategoryOrder = DATA.categories.map(item => item.name);
    const defaultCategoryIndex = new Map(defaultCategoryOrder.map((name, index) => [name, index]));

    function loadNavOrder() {
      try {
        return JSON.parse(localStorage.getItem('symbols-nav-order-v1') || '[]');
      } catch (error) {
        return [];
      }
    }

    function normalizeNavOrder(order) {
      const seen = new Set();
      const nextOrder = [];

      if (Array.isArray(order)) {
        order.forEach(name => {
          if (defaultCategoryIndex.has(name) && !seen.has(name)) {
            seen.add(name);
            nextOrder.push(name);
          }
        });
      }

      defaultCategoryOrder.forEach(name => {
        if (!seen.has(name)) {
          seen.add(name);
          nextOrder.push(name);
        }
      });

      return nextOrder;
    }

    const state = {
      query: '',
      group: '全部',
      draggingCategory: '',
      navOrder: normalizeNavOrder(loadNavOrder()),
      openCategories: new Set()
    };

    let twemojiLoader = null;

    function saveNavOrder() {
      localStorage.setItem('symbols-nav-order-v1', JSON.stringify(state.navOrder));
    }

    function ensureTwemoji() {
      if (window.twemoji) {
        return Promise.resolve(window.twemoji);
      }

      if (twemojiLoader) {
        return twemojiLoader;
      }

      twemojiLoader = new Promise(resolve => {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js';
        script.crossOrigin = 'anonymous';
        script.onload = () => resolve(window.twemoji || null);
        script.onerror = () => resolve(null);
        document.head.appendChild(script);
      });

      return twemojiLoader;
    }

    function sortCategoriesByNavOrder(categories) {
      const navIndex = new Map(state.navOrder.map((name, index) => [name, index]));
      return [...categories].sort((left, right) => {
        const leftIndex = navIndex.has(left.name) ? navIndex.get(left.name) : 9999;
        const rightIndex = navIndex.has(right.name) ? navIndex.get(right.name) : 9999;
        if (leftIndex !== rightIndex) {
          return leftIndex - rightIndex;
        }
        return (defaultCategoryIndex.get(left.name) || 9999) - (defaultCategoryIndex.get(right.name) || 9999);
      });
    }

    function moveCategoryRelative(dragName, targetName, position) {
      if (!dragName || !targetName || dragName === targetName) {
        return;
      }

      const nextOrder = state.navOrder.filter(name => name !== dragName);
      let targetIndex = nextOrder.indexOf(targetName);
      if (targetIndex === -1) {
        nextOrder.push(dragName);
      } else {
        if (position === 'after') {
          targetIndex += 1;
        }
        nextOrder.splice(targetIndex, 0, dragName);
      }

      state.navOrder = normalizeNavOrder(nextOrder);
      saveNavOrder();
      render();
    }

    function clearNavDragStates() {
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.remove('dragging', 'drag-over-before', 'drag-over-after');
      });
    }

    function codepoints(text) {
      return Array.from(text).map(ch => 'U+' + ch.codePointAt(0).toString(16).toUpperCase()).join(' ');
    }

    function isEmojiCapableCodePoint(codePoint) {
      return (
        (codePoint >= 0x2600 && codePoint <= 0x27BF)
        || (codePoint >= 0x1F000 && codePoint <= 0x1FAFF)
        || [0x00A9, 0x00AE, 0x203C, 0x2049, 0x2122, 0x2139, 0x3030, 0x303D, 0x3297, 0x3299].includes(codePoint)
      );
    }

    function prefersColorGlyph(text) {
      return Array.from(text).some(ch => isEmojiCapableCodePoint(ch.codePointAt(0)));
    }

    function toColorDisplayText(text) {
      const chars = Array.from(text);
      const output = [];

      for (let index = 0; index < chars.length; index += 1) {
        const current = chars[index];
        const next = chars[index + 1];
        const codePoint = current.codePointAt(0);

        output.push(current);

        if (next === '\uFE0F') {
          continue;
        }

        if (isEmojiCapableCodePoint(codePoint)) {
          output.push('\uFE0F');
        }
      }

      return output.join('');
    }

    function toClipboardText(text) {
      return prefersColorGlyph(text) ? toColorDisplayText(text) : text;
    }

    function renderGlyph(glyph, symbol) {
      const displaySymbol = prefersColorGlyph(symbol) ? toColorDisplayText(symbol) : symbol;
      if (displaySymbol !== symbol) {
        glyph.classList.add('prefer-color');
      }
      glyph.textContent = displaySymbol;
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const input = document.createElement('textarea');
      input.value = text;
      input.style.position = 'fixed';
      input.style.opacity = '0';
      document.body.appendChild(input);
      input.select();
      document.execCommand('copy');
      document.body.removeChild(input);
    }

    let toastTimer = null;
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    function createChip(text) {
      const div = document.createElement('div');
      div.className = 'chip';
      div.textContent = text;
      return div;
    }

    function renderHeader() {
    }

    function getGroups() {
      return ['全部', ...new Set(DATA.categories.map(item => item.group))];
    }

    function renderGroups() {
      groupFilters.textContent = '';
      getGroups().forEach(group => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'group-btn' + (group === state.group ? ' active' : '');
        button.textContent = group;
        button.addEventListener('click', () => {
          state.group = group;
          renderGroups();
          render();
        });
        groupFilters.appendChild(button);
      });
    }

    function matchesQuery(category, query) {
      if (!query) {
        return true;
      }

      const lower = query.toLowerCase();
      return category.name.toLowerCase().includes(lower)
        || category.aliases.join(' ').toLowerCase().includes(lower)
        || category.symbols.some(symbol => symbol.includes(query));
    }

    function getVisibleCategories() {
      return DATA.categories.filter(category => {
        const groupOk = state.group === '全部' || category.group === state.group;
        const queryOk = matchesQuery(category, state.query);
        return groupOk && queryOk;
      });
    }

    function renderNav(categories) {
      navLinks.textContent = '';
      if (!categories.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = '当前筛选条件下没有可显示的类别。';
        navLinks.appendChild(empty);
        return;
      }

      categories.forEach(category => {
        const link = document.createElement('a');
        link.className = 'nav-link';
        link.href = '#' + encodeURIComponent(category.name);
        link.draggable = true;
        link.dataset.categoryName = category.name;

        link.addEventListener('click', event => {
          if (state.draggingCategory) {
            return;
          }

          event.preventDefault();
          state.openCategories = new Set([category.name]);
          render();

          requestAnimationFrame(() => {
            const target = document.getElementById(encodeURIComponent(category.name));
            if (target) {
              target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
          });
        });

        link.addEventListener('dragstart', event => {
          state.draggingCategory = category.name;
          link.classList.add('dragging');
          event.dataTransfer.effectAllowed = 'move';
          event.dataTransfer.setData('text/plain', category.name);
        });

        link.addEventListener('dragover', event => {
          if (!state.draggingCategory || state.draggingCategory === category.name) {
            return;
          }
          event.preventDefault();
          const rect = link.getBoundingClientRect();
          const isAfter = event.clientY > rect.top + rect.height / 2;
          link.classList.toggle('drag-over-before', !isAfter);
          link.classList.toggle('drag-over-after', isAfter);
        });

        link.addEventListener('dragleave', () => {
          link.classList.remove('drag-over-before', 'drag-over-after');
        });

        link.addEventListener('drop', event => {
          event.preventDefault();
          const dragName = state.draggingCategory || event.dataTransfer.getData('text/plain');
          const rect = link.getBoundingClientRect();
          const isAfter = event.clientY > rect.top + rect.height / 2;
          clearNavDragStates();
          state.draggingCategory = '';
          moveCategoryRelative(dragName, category.name, isAfter ? 'after' : 'before');
        });

        link.addEventListener('dragend', () => {
          state.draggingCategory = '';
          clearNavDragStates();
        });

        const main = document.createElement('span');
        main.className = 'nav-main';

        const symbol = document.createElement('span');
        symbol.className = 'nav-symbol';
        if (category.navSymbol) {
          symbol.textContent = category.navSymbol;
        } else {
          symbol.textContent = '•';
          symbol.classList.add('is-empty');
        }

        const name = document.createElement('span');
        name.className = 'nav-text';
        name.textContent = category.navSymbol && category.name.startsWith(category.navSymbol + ' ')
          ? category.name.slice(category.navSymbol.length + 1)
          : category.name;

        main.append(symbol, name);

        const count = document.createElement('span');
        count.className = 'nav-count';
        count.textContent = category.count + ' 项';

        link.append(main, count);
        navLinks.appendChild(link);
      });
    }

    function buildCopyButton(text, label) {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'copy-btn';
      button.textContent = label;
      button.addEventListener('click', async () => {
        await copyText(text);
        showToast('已复制 ' + label);
      });
      return button;
    }

    function buildSymbolButton(symbol) {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'symbol-item';
      button.title = '点击复制\n' + codepoints(symbol);
      button.addEventListener('click', async () => {
        await copyText(toClipboardText(symbol));
        showToast('已复制: ' + symbol);
      });

      const glyph = document.createElement('div');
      glyph.className = 'glyph';
      renderGlyph(glyph, symbol);

      const label = document.createElement('div');
      label.className = 'token-label';
      label.textContent = codepoints(symbol);

      button.append(glyph, label);
      return button;
    }

    function getPrimaryCodePoint(symbol) {
      const chars = Array.from(symbol);
      return chars.length ? chars[0].codePointAt(0) : 0;
    }

    function sortSymbolsForDisplay(symbols) {
      return [...symbols].sort((left, right) => {
        const leftColor = prefersColorGlyph(left) ? 0 : 1;
        const rightColor = prefersColorGlyph(right) ? 0 : 1;
        if (leftColor !== rightColor) {
          return leftColor - rightColor;
        }

        const leftLength = Array.from(left).length;
        const rightLength = Array.from(right).length;
        if (leftLength !== rightLength) {
          return leftLength - rightLength;
        }

        const codepointDiff = getPrimaryCodePoint(left) - getPrimaryCodePoint(right);
        if (codepointDiff !== 0) {
          return codepointDiff;
        }

        return left.localeCompare(right);
      });
    }

    function getFigureSubgroupLabel(symbol) {
      if (prefersColorGlyph(symbol)) {
        return '常用彩色符号';
      }
      if (/[♥♡❤❣❥❦❧♠♣♦♤♧♢]/u.test(symbol)) {
        return '爱心与纸牌';
      }
      if (/[★☆✢✣✤✥✦✧✩✪✫✬✭✮✯✰✱✲✳✴✵✶✷✸✹✺✻✼❂✡❈❉❊]/u.test(symbol)) {
        return '星形与装饰';
      }
      if (/[☚☛☜☞☝☟✁✂✃✄✆✇✈✉☎☏✌✍✎✏✐✑✒✓✔✕✖✗✘]/u.test(symbol)) {
        return '手势与工具';
      }
      if (/[■□▢▣▤▥▦▧▨▩◢◣◤◥▲△▼▽◆◇◈◉○◌◍◎●◐◑◒◓◔◕◖◗◘◙◦◯]/u.test(symbol)) {
        return '几何与图形';
      }
      return '其他装饰字符';
    }

    function getCategorySections(category) {
      const sortedSymbols = sortSymbolsForDisplay(category.symbols);
      if (category.name !== '图案符号') {
        return [{ label: '全部符号', symbols: sortedSymbols }];
      }

      const sectionOrder = ['常用彩色符号', '爱心与纸牌', '星形与装饰', '手势与工具', '几何与图形', '其他装饰字符'];
      const sectionMap = new Map(sectionOrder.map(label => [label, []]));

      sortedSymbols.forEach(symbol => {
        sectionMap.get(getFigureSubgroupLabel(symbol)).push(symbol);
      });

      return sectionOrder
        .map(label => ({ label, symbols: sectionMap.get(label) }))
        .filter(section => section.symbols.length > 0);
    }

    function buildSymbolGrid(symbols) {
      const grid = document.createElement('div');
      grid.className = 'symbol-grid';
      symbols.forEach(symbol => {
        grid.appendChild(buildSymbolButton(symbol));
      });
      return grid;
    }

    function hydrateCategoryContent(category, container) {
      if (container.dataset.rendered === 'true') {
        return;
      }

      const sections = getCategorySections(category);
      const fragment = document.createDocumentFragment();
      let needsTwemoji = false;
      const showSubsections = category.name === '图案符号' && sections.length > 1;

      sections.forEach(section => {
        section.symbols.forEach(symbol => {
          if (prefersColorGlyph(symbol)) {
            needsTwemoji = true;
          }
        });

        if (showSubsections) {
          const subsection = document.createElement('section');
          subsection.className = 'subsection';

          const title = document.createElement('h4');
          title.className = 'subsection-title';
          title.textContent = section.label + ' · ' + section.symbols.length + ' 项';

          subsection.appendChild(title);
          subsection.appendChild(buildSymbolGrid(section.symbols));
          fragment.appendChild(subsection);
          return;
        }

        fragment.appendChild(buildSymbolGrid(section.symbols));
      });

      container.appendChild(fragment);
      container.dataset.rendered = 'true';

      if (needsTwemoji) {
        ensureTwemoji().then(twemojiLib => {
          if (twemojiLib && container.isConnected) {
            twemojiLib.parse(container, {
              folder: 'svg',
              ext: '.svg',
              className: 'emoji-img'
            });
          }
        });
      }
    }

    function renderCategories(categories) {
      categoriesContainer.textContent = '';
      if (!categories.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = '没有匹配结果，请尝试更换关键词或筛选条件。';
        categoriesContainer.appendChild(empty);
        return;
      }

      const fragment = document.createDocumentFragment();
      const hasVisibleOpenCategory = categories.some(category => state.openCategories.has(category.name));
      const autoOpenName = hasVisibleOpenCategory ? '' : (categories[0]?.name || '');

      categories.forEach(category => {
        if (autoOpenName && category.name === autoOpenName) {
          state.openCategories.add(category.name);
        }

        const details = document.createElement('details');
        details.className = 'category';
        details.open = state.openCategories.has(category.name);
        details.id = encodeURIComponent(category.name);

        const summary = document.createElement('summary');
        const head = document.createElement('div');
        head.className = 'category-head';

        const titleWrap = document.createElement('div');
        titleWrap.className = 'category-title';

        const title = document.createElement('h3');
        title.textContent = category.name;

        const meta = document.createElement('div');
        meta.className = 'category-meta';
        meta.textContent = [
          category.group,
          category.count + ' 项',
          '别名: ' + category.aliases.join(' / ')
        ].join(' · ');

        titleWrap.append(title, meta);
        head.appendChild(titleWrap);
        head.appendChild(buildCopyButton(category.symbols.map(toClipboardText).join(' '), '复制本类全部'));
        summary.appendChild(head);
        details.appendChild(summary);

        const content = document.createElement('div');
        content.className = 'category-content';

        if (details.open) {
          hydrateCategoryContent(category, content);
        }

        details.addEventListener('toggle', () => {
          if (details.open) {
            state.openCategories = new Set([category.name]);
            document.querySelectorAll('details.category').forEach(node => {
              if (node !== details) {
                node.open = false;
              }
            });
            hydrateCategoryContent(category, content);
          } else if (state.openCategories.has(category.name)) {
            state.openCategories.delete(category.name);
          }
        });

        details.appendChild(content);
        fragment.appendChild(details);
      });

      categoriesContainer.appendChild(fragment);
    }

    function renderSummary(categories) {
      const visibleItems = categories.reduce((sum, category) => sum + category.count, 0);
      resultSummary.textContent = '当前显示 ' + categories.length + ' 个类别 / ' + visibleItems + ' 个条目';
    }

    async function copyVisible() {
      const categories = getVisibleCategories();
      const all = categories.flatMap(category => category.symbols);
      if (!all.length) {
        showToast('当前没有可复制的内容');
        return;
      }
      await copyText(all.map(toClipboardText).join(' '));
      showToast('已复制当前筛选结果');
    }

    function render() {
      const categories = sortCategoriesByNavOrder(getVisibleCategories());
      renderSummary(categories);
      renderNav(categories);
      renderCategories(categories);
    }

    searchInput.addEventListener('input', event => {
      state.query = event.target.value.trim();
      render();
    });

    copyVisibleBtn.addEventListener('click', copyVisible);

    renderHeader();
    renderGroups();
    render();
  </script>
</body>
</html>
